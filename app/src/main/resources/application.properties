spring.application.name=app

server.port=${SERVER_PORT:8011}
server.tomcat.max-http-request-header-size=65536

# PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/app_agenda}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# Multipart.
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# MinIO
minio.url=${MINIO_URL:http://localhost:9000}
minio.public-url=${MINIO_PUBLIC_URL:${minio.url}}
minio.access-key=${MINIO_ACCESS_KEY:admin}
minio.secret-key=${MINIO_SECRET_KEY}
minio.bucket.fotos=${MINIO_BUCKET_FOTOS:fotos}
minio.bucket.documentos=${MINIO_BUCKET_DOCUMENTOS:documentos}

# Whereby
whereby.api-key=${WHEREBY_API_KEY}
whereby.api-url=${WHEREBY_API_URL:https://api.whereby.dev}

# IA Integration
ia.service.url=${IA_SERVICE_URL:http://localhost:8013}
